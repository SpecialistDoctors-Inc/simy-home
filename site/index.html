    <style>
      /* Hide React SPA's built-in nav — replaced by static nav below */
      #root > div > nav { display: none !important; }
      /* Static nav — identical to all other pages */

        transition: all 0.3s;

      }

        color: #0a0a0a;
      }
      .nav-version {

        font-size: 13px; font-weight: 400; letter-spacing: 0.06em;
        color: #0057ff;
      }

        color: #5a5a56; text-decoration: none;
        font-family: 'Geist', 'Helvetica Neue', Arial, sans-serif;
        font-size: 0.8125rem; font-weight: 400; letter-spacing: 0.01em;
        transition: color 0.18s; position: relative;
      }
      .nav-links a::after {
        content: ''; position: absolute; bottom: -2px; left: 0;
        width: 0; height: 1px; background-color: #0057ff;
        transition: width 0.25s;
      }
      .nav-links a:hover { color: #0a0a0a; }
      .nav-links a:hover::after { width: 100%; }
      .nav-right { display: flex; align-items: center; gap: 20px; }

  <body>
    <!-- Redirect /index.html to / so wouter home route matches -->
    <script>if(location.pathname==='/index.html')location.replace('/');</script>
    <!-- Force full navigation for static subpages (bypass wouter client-side routing) -->
    <script>
    document.addEventListener('click', function(e) {
      var a = e.target.closest('a');
      if (!a) return;
      var pages = ['/pricing.html','/compare.html','/about.html','/contact.html','/press.html',
                   '/careers.html','/status.html','/privacy.html','/terms.html',
                   '/how-it-works.html','/integrations.html','/security.html','/press-release.html'];
      try {
        var p = new URL(a.href, location.origin).pathname;
        if (pages.indexOf(p) !== -1) {
          e.preventDefault();
          e.stopPropagation();
          window.location.href = a.href;
        }
      } catch(err) {}
    }, true);
    </script>

        </div>
        <button class="mobile-menu-btn" onclick="document.getElementById('navLinks').classList.toggle('active')" aria-label="Toggle menu">

          </svg>
        </button>
      </div>
    </nav>
    <script>
    window.addEventListener('scroll', function() {
      var nav = document.getElementById('staticNav');
      if (window.scrollY > 10) { nav.classList.add('scrolled'); }
      else { nav.classList.remove('scrolled'); }
    });
    </script>
