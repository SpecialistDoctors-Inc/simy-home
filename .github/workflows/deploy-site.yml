name: Deploy Static Site

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'site/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SITE_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync HTML files (short cache)
        run: |
          aws s3 sync site/ s3://${{ secrets.SITE_S3_BUCKET }}/ \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=300"

      - name: Sync static assets (long cache)
        run: |
          aws s3 sync site/ s3://${{ secrets.SITE_S3_BUCKET }}/ \
            --exclude "*.html" \
            --cache-control "public, max-age=86400"

      - name: Update CloudFront Function
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
        continue-on-error: true
        run: |
          FUNC_NAME="simy-site-prod-redirect"
          FUNC_CODE_FILE="infra/cloudfront-functions/redirect-prod.js"

          # Get current ETag
          ETAG=$(aws cloudfront describe-function --name "$FUNC_NAME" --query 'ETag' --output text)

          # Update function code
          UPDATE_ETAG=$(aws cloudfront update-function \
            --name "$FUNC_NAME" \
            --function-config '{"Comment":"URL normalization + redirects","Runtime":"cloudfront-js-2.0"}' \
            --function-code "fileb://${FUNC_CODE_FILE}" \
            --if-match "$ETAG" \
            --query 'ETag' --output text)

          # Publish function to LIVE stage
          aws cloudfront publish-function \
            --name "$FUNC_NAME" \
            --if-match "$UPDATE_ETAG"

          echo "CloudFront Function '$FUNC_NAME' updated and published."

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.SITE_CF_DISTRIBUTION_ID }} \
            --paths "/*"
