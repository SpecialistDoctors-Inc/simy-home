name: Deploy Static Site

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SITE_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync HTML files (short cache)
        run: |
          aws s3 sync site/ s3://${{ secrets.SITE_S3_BUCKET }}/ \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=300"

      - name: Sync static assets (long cache)
        run: |
          aws s3 sync site/ s3://${{ secrets.SITE_S3_BUCKET }}/ \
            --exclude "*.html" \
            --cache-control "public, max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.SITE_CF_DISTRIBUTION_ID }} \
            --paths "/*"
