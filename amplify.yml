version: 1
applications:
  - appRoot:
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            - npm run prebuild
        build:
          commands:
            - echo "NEXT_PUBLIC_APP_ENV=$NEXT_PUBLIC_APP_ENV" >> .env.local
            - npm run next-sitemap
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
